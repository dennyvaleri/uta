<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Our Love Story ❤️</title>


<style>


*{
    box-sizing:border-box;
}



body{

    margin:0;

    height:100vh;

    overflow:hidden;

    font-family:'Segoe UI',sans-serif;

    color:white;

    background:#020617;

}



/* =========================
   BLUE CINEMATIC BACKGROUND
========================= */


.bg{

    position:fixed;

    inset:0;


    background:

    linear-gradient(
        rgba(5,20,45,.55),
        rgba(0,5,20,.85)
    ),

    url('https://images.unsplash.com/photo-1501577316686-a5cbf6c1df7e');


    background-size:cover;

    background-position:center;


    transform:scale(1.08);


    animation:bgMove 20s infinite alternate;


    z-index:-2;

}



.bg::after{

    content:"";

    position:absolute;

    inset:0;


    background:

    radial-gradient(
        circle,
        rgba(96,165,250,.25),
        transparent 60%
    );


    animation:pulse 5s infinite alternate;

}



@keyframes bgMove{

    from{

        transform:scale(1.08);

    }


    to{

        transform:scale(1.18);

    }

}



@keyframes pulse{

    from{

        opacity:.5;

    }


    to{

        opacity:1;

    }

}





/* =========================
   AUDIO
========================= */


audio{

    display:none;

}





/* =========================
   STORY PROGRESS BAR
========================= */


.progress{

    position:fixed;


    top:15px;

    left:20px;

    right:20px;


    height:5px;


    background:

    rgba(255,255,255,.25);


    border-radius:20px;


    overflow:hidden;


    z-index:1000;

}



.progress-bar{

    height:100%;


    width:0%;


    background:

    linear-gradient(
        90deg,
        #60a5fa,
        #ec4899
    );


    transition:.5s;

}





/* =========================
   PAGE
========================= */


.page{

    position:absolute;


    inset:0;


    display:none;


    justify-content:center;


    align-items:center;


    padding:25px;


    text-align:center;


}



.page.active{

    display:flex;


    animation:

    cinematic .9s ease;

}





/* =========================
   GLASS CARD
========================= */


.content{


    max-width:750px;


    width:100%;


    padding:40px 25px;



    background:


    linear-gradient(
        135deg,
        rgba(255,255,255,.18),
        rgba(96,165,250,.12)
    );



    backdrop-filter:blur(20px);



    border:

    1px solid rgba(255,255,255,.25);



    border-radius:35px;



    box-shadow:


    0 30px 80px rgba(0,20,80,.7);


}





/* =========================
   TEXT
========================= */


h1{


    font-size:

    clamp(35px,7vw,65px);


    margin:10px 0;


    text-shadow:


    0 0 20px #60a5fa;


}



p{


    font-size:

    clamp(18px,4vw,24px);


    line-height:1.7;


}



.date{


    color:#dbeafe;


    font-size:20px;


}





/* =========================
   BUTTON
========================= */


button{


    margin-top:30px;


    padding:15px 40px;


    border:none;


    border-radius:50px;


    font-size:18px;


    cursor:pointer;


}




.next,
.yes{


    color:white;


    background:


    linear-gradient(
        45deg,
        #2563eb,
        #ec4899
    );


    box-shadow:


    0 15px 35px rgba(37,99,235,.5);


}



.next:hover,
.yes:hover{


    transform:scale(1.08);


}





/* =========================
   BUTTON KABUR
========================= */


.no{


    background:white;


    color:#333;


    position:absolute;


    transition:


    left .25s ease,

    top .25s ease,

    transform .2s ease;


    z-index:10;


}





/* =========================
   IMAGE VIDEO
========================= */


img,
video{


    width:90%;


    max-width:450px;


    max-height:50vh;


    object-fit:cover;


    border-radius:30px;


    margin:20px auto;


    display:block;



    box-shadow:


    0 25px 60px rgba(0,0,0,.5);



    animation:


    photoZoom 8s infinite alternate;


}



@keyframes photoZoom{


    from{

        transform:scale(1);

    }


    to{

        transform:scale(1.08);

    }

}






/* =========================
   PAGE TRANSITION
========================= */


@keyframes cinematic{


    from{


        opacity:0;


        transform:

        scale(1.08)

        translateY(40px);



        filter:blur(10px);


    }


    to{


        opacity:1;


        transform:none;


        filter:blur(0);


    }

}





/* =========================
   MOBILE
========================= */


@media(max-width:600px){


    .content{


        padding:25px 18px;


        border-radius:25px;


    }



    h1{


        font-size:38px;


    }



    p{


        font-size:18px;


    }



    .date{


        font-size:16px;


    }



    img,
    video{


        width:95%;


        max-height:45vh;


        border-radius:20px;


    }



    button{


        padding:13px 32px;


        font-size:16px;


    }



    .progress{


        top:10px;


        left:12px;


        right:12px;


    }


}


<script>


// =========================
// ELEMENT
// =========================


const pages = document.querySelectorAll(".page");

const progressBar = document.getElementById("progressBar");

const music = document.getElementById("music");

const clickSound = document.getElementById("clickSound");

const noBtn = document.getElementById("noBtn");



let current = 0;





// =========================
// PROGRESS BAR
// =========================


function updateProgress(){


    let percent =

    (current / (pages.length - 1)) * 100;



    progressBar.style.width =

    percent + "%";


}







// =========================
// START STORY + MUSIC
// =========================


function startStory(){


    // volume 60%

    music.volume = 0.6;


    music.play()
    .catch(()=>{});



    nextPage();


}







// =========================
// CLICK SOUND
// =========================


function playClick(){


    clickSound.volume = 0.4;


    clickSound.currentTime = 0;


    clickSound.play()
    .catch(()=>{});


}







// =========================
// NEXT PAGE
// =========================


function nextPage(){


    playClick();



    pages[current]
    .classList.remove("active");



    current++;



    if(current >= pages.length){

        current = pages.length - 1;

    }



    pages[current]
    .classList.add("active");



    updateProgress();



}








// =========================
// YES BUTTON
// =========================


function yes(){


    playClick();



    document
    .getElementById("proposal")
    .classList.remove("active");



    document
    .getElementById("finish")
    .classList.add("active");



    current = pages.length - 1;



    updateProgress();



    loveExplosion();


}








// =========================
// TOMBOL TIDAK KABUR
// =========================


function moveButton(){


    const buttonWidth = noBtn.offsetWidth;

    const buttonHeight = noBtn.offsetHeight;



    const maxX =

    window.innerWidth - buttonWidth - 20;



    const maxY =

    window.innerHeight - buttonHeight - 20;




    const x =

    Math.random() * maxX;



    const y =

    Math.random() * maxY;





    noBtn.style.left =

    x + "px";



    noBtn.style.top =

    y + "px";





    noBtn.style.transform =

    "rotate(" +

    (Math.random()*30-15)

    + "deg)";



}





// Desktop

noBtn.addEventListener(

"mouseenter",

moveButton

);




// Mobile

noBtn.addEventListener(

"touchstart",

function(e){


    e.preventDefault();


    moveButton();


},

{

passive:false

}

);





// Anti klik

noBtn.addEventListener(

"click",

function(e){


    e.preventDefault();


    moveButton();


}

);









// =========================
// FLOATING HEART
// =========================


function createHeart(){



    let heart =

    document.createElement("div");



    heart.className="heart";



    heart.innerHTML =

    [

        "💙",

        "🤍",

        "❤️",

        "✨"

    ]

    [

    Math.floor(

    Math.random()*4

    )

    ];





    heart.style.position="absolute";



    heart.style.left =

    Math.random()*100 + "vw";



    heart.style.bottom="-20px";



    heart.style.fontSize =


    (15 + Math.random()*30)

    +"px";




    heart.style.animation =

    "float " +

    (3+Math.random()*4)

    +"s linear";




    document.body.appendChild(heart);




    setTimeout(()=>{


        heart.remove();


    },6000);



}



setInterval(createHeart,400);









// =========================
// FINAL LOVE EXPLOSION
// =========================


function loveExplosion(){



    for(let i=0;i<80;i++){



        setTimeout(()=>{



            let item =

            document.createElement("div");



            item.innerHTML =


            [

            "❤️",

            "💙",

            "✨",

            "💕"

            ]

            [

            Math.floor(

            Math.random()*4

            )

            ];




            item.style.position="absolute";



            item.style.left =

            Math.random()*100+"vw";



            item.style.top =

            Math.random()*100+"vh";



            item.style.fontSize =

            (20 + Math.random()*35)

            +"px";




            item.style.zIndex=999;



            item.style.animation =

            "sparkle 1.5s forwards";



            document.body.appendChild(item);




            setTimeout(()=>{


                item.remove();


            },1500);




        },i*30);



    }



}





// =========================
// TAMBAHAN ANIMASI SPARKLE
// =========================


const style = document.createElement("style");


style.innerHTML = `


.heart{

    animation-name:float;

}



@keyframes float{


    from{

        transform:

        translateY(100vh)

        rotate(0deg);

        opacity:1;

    }



    to{

        transform:

        translateY(-20vh)

        rotate(360deg);

        opacity:0;

    }


}



@keyframes sparkle{


    from{

        transform:

        scale(.5)

        translateY(0);

        opacity:1;

    }



    to{

        transform:

        scale(2)

        translateY(-100px);

        opacity:0;

    }


}


`;



document.head.appendChild(style);



</script>


</body>

</html>
