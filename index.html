<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Love Story ❤️</title>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    height:100vh;
    overflow:hidden;

    font-family:
    'Segoe UI',
    sans-serif;

    color:white;

    background:#020617;

}


/* BACKGROUND BLUE CINEMATIC */

.bg{

    position:fixed;
    inset:0;

    background:

    linear-gradient(
        rgba(5,20,45,.55),
        rgba(0,5,20,.85)
    ),

    url('https://images.unsplash.com/photo-1501577316686-a5cbf6c1df7e');

    background-size:cover;
    background-position:center;

    transform:scale(1.08);

    animation:bgMove 20s infinite alternate;

    z-index:-2;

}


.bg::after{

    content:"";

    position:absolute;

    inset:0;


    background:

    radial-gradient(
        circle,
        rgba(96,165,250,.25),
        transparent 60%
    );


    animation:pulse 5s infinite alternate;

}


@keyframes bgMove{

from{
    transform:scale(1.08);
}

to{
    transform:scale(1.18);
}

}


@keyframes pulse{

from{
opacity:.5;
}

to{
opacity:1;
}

}




/* MUSIC */

audio{
    display:none;
}



/* STORY BAR */

.progress{

    position:fixed;

    top:15px;
    left:20px;
    right:20px;

    height:5px;

    background:
    rgba(255,255,255,.25);

    border-radius:20px;

    overflow:hidden;

    z-index:1000;

}


.progress-bar{

    height:100%;

    width:0%;


    background:

    linear-gradient(
    90deg,
    #60a5fa,
    #ec4899
    );


    transition:.5s;

}





/* PAGE */

.page{

    position:absolute;

    inset:0;


    display:none;

    justify-content:center;

    align-items:center;


    padding:25px;

    text-align:center;


}


.page.active{

    display:flex;

    animation:

    cinematic .9s ease;

}



.content{


    max-width:750px;

    width:100%;


    padding:40px 25px;


    background:

    linear-gradient(
    135deg,
    rgba(255,255,255,.18),
    rgba(96,165,250,.12)
    );


    backdrop-filter:
    blur(20px);


    border:

    1px solid
    rgba(255,255,255,.25);


    border-radius:35px;


    box-shadow:

    0 30px 80px
    rgba(0,20,80,.7);


}



h1{

    font-size:

    clamp(35px,7vw,65px);


    margin:10px 0;


    text-shadow:

    0 0 20px #60a5fa;

}


p{

    font-size:

    clamp(18px,4vw,24px);


    line-height:1.7;

}



.date{

    color:#dbeafe;

    font-size:20px;

}



/* BUTTON */

button{


    margin-top:30px;

    padding:15px 40px;


    border:none;


    border-radius:50px;


    font-size:18px;


    cursor:pointer;


}



.next,
.yes{


    color:white;


    background:

    linear-gradient(
    45deg,
    #2563eb,
    #ec4899
    );


    box-shadow:

    0 15px 35px
    rgba(37,99,235,.5);


}



.next:hover,
.yes:hover{


transform:scale(1.08);


}



/* IMAGE */


img,
video{


    width:90%;

    max-width:450px;


    max-height:50vh;


    object-fit:cover;


    border-radius:30px;


    margin:20px auto;


    display:block;


    box-shadow:

    0 25px 60px
    rgba(0,0,0,.5);


    animation:

    photoZoom 8s infinite alternate;


}



@keyframes photoZoom{

from{

transform:scale(1);

}

to{

transform:scale(1.08);

}

}





@keyframes cinematic{

from{

opacity:0;

transform:
scale(1.08)
translateY(40px);

filter:blur(10px);

}

to{

opacity:1;

transform:none;

filter:blur(0);

}

}
